# Interfaces corretas
interface=lo
interface=wlan0
interface=tun0

# Bind nelas
bind-interfaces

# DNS upstream
no-resolv
server=1.1.1.1
server=8.8.8.8

# Domínio local
domain=home
local=/home/

# 🔥 wildcard (melhor que várias linhas)
address=/.home/100.75.209.34

# Evitar problemas de permissão
user=root

# Evitar pidfile bug
pid-file=
